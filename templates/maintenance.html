<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Under Optimization</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#020005;font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#06000c;border:3px solid #ef4444;border-radius:12px;padding:48px 40px;text-align:center;max-width:420px;box-shadow:0 0 40px rgba(239,68,68,0.25)}
    .icon{font-size:56px;margin-bottom:16px;filter:drop-shadow(0 0 16px #ef4444)}
    .title{font-size:22px;font-weight:700;color:#ef4444;letter-spacing:2px;margin-bottom:8px}
    .message{background:#111;border:2px solid #2a2a2a;border-radius:8px;padding:14px 16px;font-size:14px;color:#d1d5db;line-height:1.6}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔧</div>
    <div class="title">MAINTENANCE SYSTEM CORE</div>
    <div class="message">{{ message or 'System undergoing optimizations. Back online shortly.' }}</div>
  </div>
</body>
</html>
