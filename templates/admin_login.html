<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | {{ site_name or '—͞SᎻꫝᎮᎮƝ᥆ꤪꤨꤨ  𝐂𝚘𝙳𝚎𝚡' }}</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#020005;font-family:'JetBrains Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#06000c;border:3px solid #fbbf24;border-radius:12px;padding:36px 32px;width:340px;box-shadow:0 0 35px #fbbf2444}
    .icon{font-size:40px;text-align:center;margin-bottom:12px}
    .title{text-align:center;font-size:18px;font-weight:700;color:#fbbf24;letter-spacing:2px;margin-bottom:4px;text-shadow:0 0 10px #fbbf24}
    .sub{text-align:center;font-size:11px;color:#6b7280;margin-bottom:24px}
    .error{background:#2a0808;border:2px solid #ef4444;border-radius:8px;padding:9px 12px;color:#f87171;font-size:12px;margin-bottom:14px;font-weight:bold}
    input{width:100%;padding:11px 14px;background:#111;border:2px solid #fbbf2466;border-radius:8px;color:#fbbf24;font-family:inherit;font-size:14px;outline:none;margin-bottom:14px}
    input:focus{border-color:#fbbf24;box-shadow:0 0 10px #fbbf2444}
    .btn{width:100%;padding:12px;background:transparent;border:3px solid #fbbf24;border-radius:8px;color:#fbbf24;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:all .2s}
    .btn:hover{background:#fbbf2422;box-shadow:0 0 16px #fbbf2466}
    .back{display:block;text-align:center;margin-top:14px;font-size:12px;color:#6b7280;text-decoration:none;font-weight:bold}
    .back:hover{color:#fbbf24}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <div class="title">ADMIN TERMINAL</div>
    <div class="sub">{{ site_name or '—͞SᎻ嫌ᎮƝ᥆ꤪꤨꤨ 𝐂𝚘𝙳𝚎𝚡' }} CONTROL MANAGER</div>
    {% if error %}<div class="error">▲ {{ error }}</div>{% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="Enter Secure Admin Password" required autofocus>
      <button type="submit" class="btn">&gt; ACCESS CONTROL</button>
    </form>
    <a href="/login" class="back">← RETURN TO LOGIN</a>
  </div>
</body>
</html>
